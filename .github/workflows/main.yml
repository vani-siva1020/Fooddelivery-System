name: CI + Docker

on:
  push:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.10"

    - name: Install deps
      run: pip install -r requirements.txt

    - name: Run app test
      run: |
        nohup python app.py > log.txt 2>&1 &
        sleep 5
        curl --fail http://127.0.0.1:5001/

    - name: Build Docker image
      run: docker build -t food-app .
